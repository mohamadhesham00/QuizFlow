openapi: 3.0.3
info:
  title: QuizFlow API
  version: 1.0.0
  description: |
    Simplified examination system API.
    - Teacher: question bank, exam generation (4 shuffled forms), export results.
    - Student: random form assignment, timed attempt, instant feedback.
servers:
  - url: http://localhost:5000

security:
  - bearerAuth: []

tags:
  - name: Auth
  - name: Questions
  - name: Exams
  - name: Student

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    QuestionOptionInput:
      type: object
      required: [text, isCorrect]
      description: Client payload for a question option. Do not send optionId; the backend generates it.
      properties:
        text:
          type: string
          example: is
        isCorrect:
          type: boolean
          example: true

    QuestionOption:
      type: object
      description: Stored and returned option object. optionId is generated by the backend.
      required: [optionId, text, isCorrect]
      properties:
        optionId:
          type: string
          example: b6f4f5e2-8b5d-4b0f-9f1d-2d8d0d7a9c11
        text:
          type: string
          example: is
        isCorrect:
          type: boolean
          example: true

    QuestionCreateRequest:
      type: object
      required: [text, options]
      description: Create or update a question. Provide option text plus isCorrect only; optionId is generated automatically.
      properties:
        text:
          type: string
        subject:
          type: string
          enum: [Databases, Backend, Frontend, DevOps, Basics]
        difficulty:
          type: string
          enum: [easy, medium, hard]
        tags:
          type: array
          items:
            type: string
        estimatedTimeSeconds:
          type: integer
        points:
          type: integer
        options:
          type: array
          minItems: 2
          items:
            $ref: "#/components/schemas/QuestionOptionInput"
      example:
        text: "My name is ..... Mohamad"
        subject: "Basics"
        difficulty: "medium"
        options:
          - text: "is"
            isCorrect: true
          - text: "are"
            isCorrect: false
          - text: "she"
            isCorrect: false
          - text: "he"
            isCorrect: false

    Question:
      type: object
      properties:
        _id:
          type: string
        text:
          type: string
        imageUrl:
          type: string
        options:
          type: array
          items:
            $ref: "#/components/schemas/QuestionOption"
        createdBy:
          type: string

    CreateExamRequest:
      type: object
      required: [title, questionIds]
      properties:
        title:
          type: string
        description:
          type: string
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
        durationSeconds:
          type: integer
        allowLateSubmission:
          type: boolean
        questionIds:
          type: array
          items:
            type: string

    StudentAnswerInput:
      type: object
      required: [questionId, selectedOptionId]
      properties:
        questionId:
          type: string
        selectedOptionId:
          type: string

    SubmitAttemptRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items:
            $ref: "#/components/schemas/StudentAnswerInput"

paths:
  /:
    get:
      summary: Health check
      responses:
        "200":
          description: API running

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      x-postman-tests: |
        const res = pm.response.json();

        if ((pm.response.code === 200 || pm.response.code === 201) && res?.token) {
          const token = res.token;

          pm.environment.set(
            'bearerToken',
            `${token}`
          );
        }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
        "401":
          description: Invalid credentials

  /api/questions:
    post:
      tags: [Questions]
      summary: Create question (teacher)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreateRequest"
      responses:
        "201":
          description: Question created
    get:
      tags: [Questions]
      summary: List questions (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Questions list

  /api/questions/{id}:
    get:
      tags: [Questions]
      summary: Get question by id (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Question
    patch:
      tags: [Questions]
      summary: Update question (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreateRequest"
      responses:
        "200":
          description: Updated
    delete:
      tags: [Questions]
      summary: Delete question (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /api/questions/{id}/image:
    post:
      tags: [Questions]
      summary: Upload question image (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Image uploaded
    delete:
      tags: [Questions]
      summary: Delete question image (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image removed

  /api/exams:
    post:
      tags: [Exams]
      summary: Create exam with 4 forms (teacher)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExamRequest"
      responses:
        "201":
          description: Exam created
    get:
      tags: [Exams]
      summary: List exams (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Exams list

  /api/exams/{id}:
    get:
      tags: [Exams]
      summary: Get exam by id (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Exam
    patch:
      tags: [Exams]
      summary: Update exam configuration (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Exam updated
    delete:
      tags: [Exams]
      summary: Delete exam (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Exam deleted

  /api/exams/{id}/publish:
    patch:
      tags: [Exams]
      summary: Publish exam (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Published

  /api/exams/{id}/unpublish:
    patch:
      tags: [Exams]
      summary: Unpublish exam (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Unpublished

  /api/exams/{id}/forms:
    get:
      tags: [Exams]
      summary: Inspect generated forms (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Forms payload

  /api/exams/{id}/results:
    get:
      tags: [Exams]
      summary: Get exam results JSON (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Results payload

  /api/exams/{id}/analytics:
    get:
      tags: [Exams]
      summary: Get exam analytics (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Analytics payload

  /api/exams/{id}/attempts/{attemptId}:
    get:
      tags: [Exams]
      summary: Get attempt details (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attempt detail

  /api/exams/{id}/attempts/{attemptId}/timer:
    patch:
      tags: [Exams]
      summary: Extend or override attempt timer (teacher)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timer updated

  /api/exams/{id}/export:
    get:
      tags: [Exams]
      summary: Export exam results as Excel (teacher)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: XLSX file
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary

  /api/student/exams/{examId}/start:
    post:
      tags: [Student]
      summary: Start exam and assign random form (student)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: examId
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Attempt started

  /api/student/exams:
    get:
      tags: [Student]
      summary: List available published exams for student
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Available exams

  /api/student/attempts/{attemptId}:
    get:
      tags: [Student]
      summary: Get assigned form questions (student-safe)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: attemptId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Attempt payload

  /api/student/attempts/{attemptId}/submit:
    post:
      tags: [Student]
      summary: Submit attempt and get score/time
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: attemptId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitAttemptRequest"
      responses:
        "200":
          description: Submission result

  /api/student/attempts/{attemptId}/answers:
    patch:
      tags: [Student]
      summary: Save draft answers (autosave/manual)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Draft saved

  /api/student/attempts/{attemptId}/state:
    get:
      tags: [Student]
      summary: Get active attempt state for resume
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attempt state

  /api/student/attempts/{attemptId}/timer:
    get:
      tags: [Student]
      summary: Get server-authoritative remaining time
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Timer payload

  /api/student/attempts/{attemptId}/heartbeat:
    post:
      tags: [Student]
      summary: Heartbeat for active session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Heartbeat accepted

  /api/student/attempts/{attemptId}/result:
    get:
      tags: [Student]
      summary: Get attempt result/review after submit
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attempt result

  /api/student/attempts:
    get:
      tags: [Student]
      summary: List current student attempts
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Attempts list
