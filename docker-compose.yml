services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand(''ping'').ok" > /dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  seed:
    build:
      context: ./server
    image: quizflow-server
    command: npm run seed
    restart: "no"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/QuizFlow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-quizflow-dev-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-quizflow-dev-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  server:
    build:
      context: ./server
    image: quizflow-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/QuizFlow
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-quizflow-dev-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-quizflow-dev-refresh-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    ports:
      - "5001:5000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "require(''http'').get(''http://127.0.0.1:5000/'', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:5001
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "5000:80"

volumes:
  mongo_data:
